<p-button
  type="button"
  routerLink="/nacimientos"
  [text]="true"
  label="Volver"
  icon="pi pi-arrow-left"
  styleClass="mb-4 !text-pink-600 !rounded-xl"
/>

<div class="clay-card p-6 max-w-xl mx-auto">
  <h2 class="font-display text-xl font-bold text-pink-700 dark:text-pink-400 mb-6 m-0">
    {{ isNew() ? '¡Bienvenido al mundo!' : 'Editar hijo' }}
  </h2>

  @if (store.ageSummary()) {
    <div class="mb-4 p-3 rounded-xl bg-pink-50 dark:bg-stone-800 border border-pink-100 dark:border-stone-700 flex items-center gap-2">
      <i class="pi pi-clock text-pink-400"></i>
      <span class="text-sm font-medium text-pink-700 dark:text-pink-300">Tiempo de vida: {{ store.ageSummary() }}</span>
    </div>
  }

  <!-- Foto de perfil -->
  <div class="flex flex-col items-center mb-6">
    <div
      class="relative w-24 h-24 cursor-pointer group"
      (click)="photoInput.click()"
    >
      @if (photoPreviewUrl()) {
        <img
          [src]="photoPreviewUrl()"
          alt="Foto de perfil"
          class="w-24 h-24 rounded-full object-cover border-4 border-pink-200 shadow-lg"
        />
      } @else {
        <div class="w-24 h-24 rounded-full bg-gradient-to-br from-pink-200 to-pink-400 flex items-center justify-center border-4 border-pink-200 shadow-lg">
          <i class="pi pi-camera text-white text-2xl"></i>
        </div>
      }
      <!-- Overlay hover -->
      <div class="absolute inset-0 rounded-full bg-black/30 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
        <i class="pi pi-camera text-white text-xl"></i>
      </div>
    </div>
    <p class="text-xs text-slate-400 dark:text-stone-500 mt-2">Toca para cambiar la foto</p>
    <input #photoInput type="file" accept="image/*" class="hidden" (change)="onPhotoSelect($event)" />
  </div>

  <form [formGroup]="form" class="flex flex-col gap-4">
    <div class="flex flex-col gap-1.5">
      <label for="fn" class="text-sm font-semibold text-slate-700 dark:text-stone-200">Nombre *</label>
      <input id="fn" pInputText type="text" formControlName="firstName" class="w-full !rounded-xl" autocomplete="given-name" placeholder="ej. Sofía" />
    </div>
    <div class="flex flex-col gap-1.5">
      <label for="ln" class="text-sm font-semibold text-slate-700 dark:text-stone-200">Apellido *</label>
      <input id="ln" pInputText type="text" formControlName="lastName" class="w-full !rounded-xl" autocomplete="family-name" placeholder="ej. González" />
    </div>
    <div class="flex flex-col gap-1.5">
      <label class="text-sm font-semibold text-slate-700 dark:text-stone-200">Fecha de nacimiento *</label>
      <p-datepicker formControlName="birthDate" dateFormat="yy-mm-dd" [showIcon]="true" styleClass="w-full" />
    </div>
    <div class="flex flex-col gap-1.5">
      <label for="bt" class="text-sm font-semibold text-slate-700 dark:text-stone-200">Hora de nacimiento</label>
      <input id="bt" pInputText type="time" formControlName="birthTime" class="w-full !rounded-xl" />
    </div>

    <!-- Checkbox predeterminado -->
    <div class="flex items-center gap-3 p-3 rounded-xl bg-pink-50 dark:bg-stone-800 border border-pink-100 dark:border-stone-700">
      <p-checkbox formControlName="isDefault" [binary]="true" inputId="isDefault" />
      <label for="isDefault" class="text-sm font-semibold text-slate-700 dark:text-stone-200 cursor-pointer select-none">
        Definir como predeterminado
      </label>
    </div>
    <p class="text-xs text-slate-400 dark:text-stone-500 -mt-2">
      Al reabrir la app, este hijo quedará seleccionado automáticamente
    </p>

    <div class="flex flex-wrap gap-2 pt-2">
      <p-button
        type="button"
        label="Guardar"
        icon="pi pi-check"
        [loading]="store.isSaving()"
        [disabled]="store.isLoading()"
        (onClick)="submit()"
        styleClass="!bg-pink-500 !border-pink-500 hover:!bg-pink-600 !rounded-xl !font-semibold flex-1"
      />
      <p-button
        type="button"
        routerLink="/nacimientos"
        label="Cancelar"
        [outlined]="true"
        styleClass="!rounded-xl !border-pink-300 !text-pink-600"
      />
    </div>
  </form>
</div>
